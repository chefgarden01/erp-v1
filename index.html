<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그트플 통합관리시스템</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="header-left">
            <div class="logo">GTP</div>
            <h1>그트플 통합관리시스템</h1>
        </div>
        <div class="header-right">
            <span class="user-info">관리자 (Admin)</span>
        </div>
    </header>

    <!-- 모듈 탭 -->
    <nav class="module-tabs" id="moduleTabs">
        <button class="module-tab active" data-module="system" onclick="switchModule('system')">시스템관리</button>
        <button class="module-tab" data-module="farm" onclick="switchModule('farm')">농장관리</button>
        <button class="module-tab" data-module="order" onclick="switchModule('order')">주문관리</button>
        <button class="module-tab" data-module="outbound" onclick="switchModule('outbound')">출고재고관리</button>
        <button class="module-tab" data-module="inbound" onclick="switchModule('inbound')">입고관리</button>
        <button class="module-tab" data-module="sales" onclick="switchModule('sales')">판매관리</button>
        <button class="module-tab" data-module="operation" onclick="switchModule('operation')">운영관리</button>
        <button class="module-tab" data-module="analysis" onclick="switchModule('analysis')">분석관리</button>
    </nav>

    <!-- 작업탭 바 -->
    <div class="worktab-bar" id="worktabBar"></div>

    <div class="container">
        <!-- 사이드바 (모듈별 동적 렌더링) -->
        <nav class="sidebar" id="sidebar"></nav>

        <!-- 메인 콘텐츠 -->
        <main class="main-content" id="mainContent">
            <!-- 동적으로 렌더링 -->
        </main>
    </div>

    <!-- 모달: 신규등록/수정 -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal" id="formModal">
            <div class="modal-header">
                <h3 id="modalTitle">신규 등록</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 동적 폼 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" id="btnSave" onclick="saveRecord()">저장</button>
            </div>
        </div>
    </div>

    <!-- 모달: 엑셀 업로드 -->
    <div class="modal-overlay" id="excelModalOverlay" style="display:none;">
        <div class="modal" id="excelModal">
            <div class="modal-header">
                <h3>엑셀 대량 등록</h3>
                <button class="modal-close" onclick="closeExcelModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="excel-upload-area" id="excelDropZone">
                    <p>엑셀 파일을 드래그하거나 클릭하여 선택</p>
                    <p class="text-muted">.xlsx, .xls 파일 지원</p>
                    <input type="file" id="excelFileInput" accept=".xlsx,.xls" style="display:none" onchange="handleExcelFile(event)">
                </div>
                <div id="excelPreview" style="display:none;">
                    <h4>미리보기 (<span id="excelRowCount">0</span>건)</h4>
                    <div class="table-wrapper" style="max-height:300px;">
                        <table id="excelPreviewTable" class="data-table">
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeExcelModal()">취소</button>
                <button class="btn btn-primary" id="btnExcelImport" onclick="importExcelData()" disabled>등록</button>
            </div>
        </div>
    </div>

    <!-- QR코드 모달 -->
    <div class="modal-overlay" id="qrModalOverlay" style="display:none;">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>QR 코드</h3>
                <button class="modal-close" onclick="closeQrModal()">&times;</button>
            </div>
            <div class="modal-body" style="text-align:center;">
                <canvas id="qrCanvas"></canvas>
                <p id="qrCodeText" style="margin-top:10px;font-weight:bold;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeQrModal()">닫기</button>
                <button class="btn btn-primary" onclick="printQr()">인쇄</button>
            </div>
        </div>
    </div>

    <script src="js/codeDefinitions.js"></script>
    <script src="js/commonCode.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
